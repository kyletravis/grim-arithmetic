name: Release

on:
  push:
    tags:
      - 'v*'
  # Reusable entry point for the Cut Release workflow. Tags created by Actions
  # with GITHUB_TOKEN do NOT trigger `on: push: tags` (GitHub suppresses
  # workflow-triggering events from that token), so cut-release.yml must call
  # this workflow directly with the tag it just created.
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.7.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # In workflow_call mode the default checkout would be the caller's ref
      # (main), not the tag — pin to the tag explicitly. On tag push,
      # inputs.tag is empty and github.ref_name is the tag itself.
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Guard: the pushed tag must match package.json version, because
      # build-release.mjs derives the zip name and module.json download URL
      # from package.json. A mismatch would publish a broken download link.
      - name: Verify tag matches package.json version
        env:
          REF_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          TAG="${REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "Tag version:  $TAG"
          echo "package.json: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci

      # check ends with `vite build`, producing dist/; package zips it.
      - run: npm run check
      - run: npm run package

      - name: Determine prerelease flag
        id: prerelease
        env:
          REF_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          case "$REF_NAME" in
            *-rc*|*-beta*|*-alpha*) echo "value=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "value=false" >> "$GITHUB_OUTPUT" ;;
          esac

      # Pull just this version's section out of CHANGELOG.md for the release body.
      - name: Extract changelog section
        env:
          REF_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          # Match "## v<version>" as a whole token (optionally followed by " - title"),
          # so it doesn't fall back to the full changelog, and so v0.7.1 doesn't also
          # match v0.7.1-rc4 or a future v0.7.10. Literal (index) matching avoids regex
          # dot pitfalls in the version string.
          awk -v ver="$VERSION" '
            index($0, "## v" ver) == 1 {
              rest = substr($0, length("## v" ver) + 1)
              if (rest == "" || substr(rest, 1, 1) == " ") { found = 1; next }
            }
            found && index($0, "## v") == 1 { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section for v${VERSION}; falling back to full changelog."
            cp CHANGELOG.md release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # In workflow_call mode the ref is main, so the tag must be explicit;
          # otherwise the release would be created against "main".
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: Grim Arithmetic ${{ inputs.tag || github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
          files: |
            releases/grim-arithmetic-${{ inputs.tag || github.ref_name }}.zip
            releases/module.json
